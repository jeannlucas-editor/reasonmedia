const express = require("express");
const axios = require("axios");
const router = express.Router();

const CANVA_AUTH_URL = "https://www.canva.com/api/oauth/authorize";
const CANVA_TOKEN_URL = "https://api.canva.com/rest/v1/oauth/token";

// ─── Redirect user to Canva OAuth ───────────────────────────
router.get("/canva", (req, res) => {
  const params = new URLSearchParams({
    client_id: process.env.CANVA_CLIENT_ID,
    redirect_uri: process.env.CANVA_REDIRECT_URI,
    response_type: "code",
    scope: [
      "design:content:read",
      "design:content:write",
      "design:meta:read",
      "asset:read",
      "asset:write",
      "folder:read",
    ].join(" "),
  });

  res.redirect(`${CANVA_AUTH_URL}?${params}`);
});

// ─── Handle OAuth callback ───────────────────────────────────
router.get("/callback", async (req, res) => {
  const { code, error } = req.query;

  if (error || !code) {
    return res.redirect(
      `${process.env.FRONTEND_URL}?error=${encodeURIComponent(error || "auth_failed")}`
    );
  }

  try {
    const credentials = Buffer.from(
      `${process.env.CANVA_CLIENT_ID}:${process.env.CANVA_CLIENT_SECRET}`
    ).toString("base64");

    const { data } = await axios.post(
      CANVA_TOKEN_URL,
      new URLSearchParams({
        grant_type: "authorization_code",
        code,
        redirect_uri: process.env.CANVA_REDIRECT_URI,
      }),
      {
        headers: {
          Authorization: `Basic ${credentials}`,
          "Content-Type": "application/x-www-form-urlencoded",
        },
      }
    );

    // Store tokens in session
    req.session.accessToken = data.access_token;
    req.session.refreshToken = data.refresh_token;
    req.session.tokenExpiry = Date.now() + data.expires_in * 1000;

    res.redirect(`${process.env.FRONTEND_URL}?auth=success`);
  } catch (err) {
    console.error("OAuth error:", err.response?.data || err.message);
    res.redirect(`${process.env.FRONTEND_URL}?error=token_exchange_failed`);
  }
});

// ─── Refresh access token ────────────────────────────────────
router.post("/refresh", async (req, res) => {
  if (!req.session.refreshToken) {
    return res.status(401).json({ error: "No refresh token" });
  }

  try {
    const credentials = Buffer.from(
      `${process.env.CANVA_CLIENT_ID}:${process.env.CANVA_CLIENT_SECRET}`
    ).toString("base64");

    const { data } = await axios.post(
      CANVA_TOKEN_URL,
      new URLSearchParams({
        grant_type: "refresh_token",
        refresh_token: req.session.refreshToken,
      }),
      {
        headers: {
          Authorization: `Basic ${credentials}`,
          "Content-Type": "application/x-www-form-urlencoded",
        },
      }
    );

    req.session.accessToken = data.access_token;
    req.session.tokenExpiry = Date.now() + data.expires_in * 1000;

    res.json({ success: true });
  } catch (err) {
    res.status(401).json({ error: "Token refresh failed" });
  }
});

// ─── Check auth status ───────────────────────────────────────
router.get("/status", (req, res) => {
  const isAuthenticated = !!(
    req.session.accessToken &&
    req.session.tokenExpiry > Date.now()
  );
  res.json({ authenticated: isAuthenticated });
});

// ─── Logout ──────────────────────────────────────────────────
router.post("/logout", (req, res) => {
  req.session.destroy();
  res.json({ success: true });
});

module.exports = router;
